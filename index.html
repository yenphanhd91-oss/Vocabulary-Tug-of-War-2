<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字拔河大賽 - 生動版</title>
    <style>
        :root {
            --dolphin: #0984e3;
            --cat: #e67e22;
            --grass: #55efc4;
            --sky: #81ecec;
        }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            background: linear-gradient(to bottom, var(--sky) 0%, #fff 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* 頂部狀態欄 */
        #status-bar {
            width: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px 0;
            display: flex;
            justify-content: space-around;
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 50;
        }

        /* 拔河場景區 */
        #arena {
            width: 100%;
            height: 350px;
            position: relative;
            background: #f1f2f6;
            background-image: radial-gradient(#dcdde1 2px, transparent 2px);
            background-size: 30px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 10px solid #2ecc71;
        }

        .team {
            position: absolute;
            font-size: 90px;
            transition: all 0.4s ease;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
            bottom: 60px;
        }
        #dolphin-team { left: 10%; }
        #cat-team { right: 10%; }

        #rope-container {
            width: 70%;
            height: 20px;
            background: #8c7e6a;
            border-radius: 10px;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        #knot {
            width: 40px;
            height: 70px;
            background: #ff4757;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 8px;
            border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 題目顯示 */
        #quiz-box {
            flex-grow: 1;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #question {
            font-size: 3.5rem;
            background: white;
            padding: 20px 50px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            color: #2d3436;
            border: 4px solid #f1f2f6;
        }

        /* 兩隊操作區 */
        #battle-ground {
            display: flex;
            width: 100%;
            height: 250px;
            gap: 40px;
            padding: 0 20px 20px 20px;
            box-sizing: border-box;
        }
        .side {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: rgba(255,255,255,0.6);
            padding: 20px;
            border-radius: 25px;
            backdrop-filter: blur(5px);
        }
        .dolphin-side { border: 5px solid var(--dolphin); }
        .cat-side { border: 5px solid var(--cat); }

        .btn {
            font-size: 2.5rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            transition: all 0.1s;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
        }
        .btn-dolphin { background: var(--dolphin); }
        .btn-cat { background: var(--cat); }
        .btn:active { transform: translateY(8px); box-shadow: none; }

        /* 動畫效果 */
        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); }
            75% { transform: translateX(15px); }
        }
        .jump { animation: jump 0.5s ease; }
        .shake { animation: shake 0.4s ease; }

        /* 結算畫面 */
        #finish-line {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="status-bar">
    <div>⏱️ 剩餘時間：<span id="time">90</span> 秒</div>
    <div>🚩 進度：<span id="progress">0</span> / 30</div>
</div>

<div id="arena">
    <div id="dolphin-team" class="team">🐬</div>
    <div id="rope-container">
        <div id="knot"></div>
    </div>
    <div id="cat-team" class="team">🐱</div>
</div>

<div id="quiz-box">
    <div id="question">載入中...</div>
    <div id="battle-ground">
        <div class="side dolphin-side">
            <button class="btn btn-dolphin" onclick="answer(0, 'L')">?</button>
            <button class="btn btn-dolphin" onclick="answer(1, 'L')">?</button>
        </div>
        <div class="side cat-side">
            <button class="btn btn-cat" onclick="answer(0, 'R')">?</button>
            <button class="btn btn-cat" onclick="answer(1, 'R')">?</button>
        </div>
    </div>
</div>

<div id="finish-line">
    <h1 id="result-title" style="font-size: 5rem;"></h1>
    <p id="result-desc" style="font-size: 2rem;"></p>
    <button onclick="location.reload()" style="padding: 20px 60px; font-size: 2rem; cursor: pointer; border-radius: 50px; background: #2ecc71; color: white; border: none; margin-top: 30px;">重新挑戰</button>
</div>

<script>
    const data = [
        { q: "這件事情還（ ）完成。", o: ["未", "末"], a: 0 },
        { q: "這是一年之（ ）。", o: ["未", "末"], a: 1 },
        { q: "他是一位勇敢的（ ）兵。", o: ["士", "土"], a: 0 },
        { q: "地上有很多（ ）。", o: ["士", "土"], a: 1 },
        { q: "我（ ）經吃飽了。", o: ["已", "己"], a: 0 },
        { q: "請先做好自（ ）管理。", o: ["已", "己"], a: 1 },
        { q: "今（ ）天氣很好。", o: ["日", "曰"], a: 0 },
        { q: "孔子（ ）：「學而時習之。」", o: ["日", "曰"], a: 1 },
        { q: "有一個（ ）走進教室。", o: ["人", "入"], a: 0 },
        { q: "請（ ）內坐。", o: ["人", "入"], a: 1 },
        { q: "他用（ ）切水果。", o: ["刀", "力"], a: 0 },
        { q: "做事情要用（ ）氣。", o: ["刀", "力"], a: 1 },
        { q: "他有一（ ）元。", o: ["千", "干"], a: 0 },
        { q: "不要隨便（ ）涉別人。", o: ["千", "干"], a: 1 },
        { q: "這是一棵大（ ）。", o: ["木", "本"], a: 0 },
        { q: "這（ ）書很好看。", o: ["木", "本"], a: 1 },
        { q: "他長得很（ ）高了。", o: ["大", "太"], a: 1 },
        { q: "今天（ ）陽很大。", o: ["大", "太"], a: 1 },
        { q: "今（ ）是星期五。", o: ["天", "夭"], a: 0 },
        { q: "小狗不幸（ ）折。", o: ["天", "夭"], a: 1 },
        { q: "農夫在放（ ）。", o: ["牛", "午"], a: 0 },
        { q: "中（ ）休息時間到了。", o: ["牛", "午"], a: 1 },
        { q: "他是國（ ）。", o: ["王", "玉"], a: 0 },
        { q: "這塊（ ）很漂亮。", o: ["王", "玉"], a: 1 },
        { q: "他的頭髮很（ ）。", o: ["白", "百"], a: 0 },
        { q: "他活到一（ ）歲。", o: ["白", "百"], a: 1 },
        { q: "請用眼（ ）看。", o: ["目", "自"], a: 0 },
        { q: "請（ ）己完成作業。", o: ["目", "自"], a: 1 },
        { q: "他用（ ）拿東西。", o: ["手", "毛"], a: 0 },
        { q: "小狗身上有很多（ ）。", o: ["手", "毛"], a: 1 }
    ];

    let pool = [], idx = 0, rope = 50, time = 90, active = true;

    function start() {
        pool = [...data].sort(() => Math.random() - 0.5);
        showQ();
        let timer = setInterval(() => {
            if(!active) return clearInterval(timer);
            time--;
            document.getElementById('time').innerText = time;
            if(time <= 0) over();
        }, 1000);
    }

    function showQ() {
        if(idx >= pool.length) return over();
        const q = pool[idx];
        document.getElementById('question').innerText = q.q;
        document.getElementById('progress').innerText = idx + 1;
        document.querySelectorAll('.btn').forEach((b, i) => b.innerText = q.o[i % 2]);
    }

    function answer(opt, side) {
        if(!active) return;
        const correct = pool[idx].a;
        const dolphinEl = document.getElementById('dolphin-team');
        const catEl = document.getElementById('cat-team');

        if(opt === correct) {
            // 答對效果
            if(side === 'L') { 
                rope -= 6; 
                dolphinEl.classList.add('jump'); 
                setTimeout(() => dolphinEl.classList.remove('jump'), 500);
            } else { 
                rope += 6; 
                catEl.classList.add('jump'); 
                setTimeout(() => catEl.classList.remove('jump'), 500);
            }
            idx++;
            setTimeout(showQ, 300);
        } else {
            // 答錯懲罰
            if(side === 'L') { 
                rope += 4; 
                dolphinEl.classList.add('shake'); 
                setTimeout(() => dolphinEl.classList.remove('shake'), 400);
            } else { 
                rope -= 4; 
                catEl.classList.add('shake'); 
                setTimeout(() => catEl.classList.remove('shake'), 400);
            }
        }
        updateRope();
    }

    function updateRope() {
        rope = Math.max(5, Math.min(95, rope));
        document.getElementById('knot').style.left = rope + '%';
        // 角色位置跟著繩子稍微晃動
        document.getElementById('dolphin-team').style.transform = `translateX(${(50-rope)*2}px)`;
        document.getElementById('cat-team').style.transform = `translateX(${(50-rope)*2}px)`;
    }

    function over() {
        active = false;
        const win = document.getElementById('result-title');
        const desc = document.getElementById('result-desc');
        document.getElementById('finish-line').style.display = 'flex';
        
        if(rope < 48) { win.innerText = "🐬 海豚隊 勝利！"; win.style.color = "#00d2ff"; }
        else if(rope > 52) { win.innerText = "🐱 小貓隊 勝利！"; win.style.color = "#ff9f43"; }
        else { win.innerText = "平手！"; }
        desc.innerText = `雙方共同完成了 ${idx} 道題目！`;
    }

    window.onload = start;
</script>
</body>
</html>
