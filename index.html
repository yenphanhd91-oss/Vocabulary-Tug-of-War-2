<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字拔河大賽 - 易混淆字挑戰</title>
    <style>
        :root {
            --dolphin-color: #00a8ff;
            --cat-color: #ff9f43;
            --rope-color: #8c7e6a;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        /* 拔河場景區 */
        #game-stage {
            width: 100%;
            height: 300px;
            background: #fff;
            position: relative;
            border-bottom: 5px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .team-icon {
            font-size: 80px;
            position: absolute;
            transition: all 0.5s ease;
            z-index: 10;
        }
        #dolphin-team { left: 5%; }
        #cat-team { right: 5%; }
        
        #rope {
            width: 80%;
            height: 15px;
            background: var(--rope-color);
            position: relative;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #knot {
            width: 30px;
            height: 50px;
            background: #ff0000;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        /* 資訊列 */
        #info-bar {
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            background: #333;
            color: white;
            font-size: 1.2rem;
        }

        /* 題目顯示區 */
        #question-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }
        #question-text {
            font-size: 2.5rem;
            margin-bottom: 30px;
            font-weight: bold;
            text-align: center;
        }

        /* 按鈕互動區 */
        #controls {
            display: flex;
            width: 100%;
            height: 250px;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }
        .control-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            border-radius: 15px;
            border: 3px dashed #ccc;
        }
        .dolphin-side { background: #e3f2fd; border-color: var(--dolphin-color); }
        .cat-side { background: #fff3e0; border-color: var(--cat-color); }
        
        .side-label {
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1
